<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>Dynamic Multiplication Table</title>

        <!-- style sheets -->
        <link rel="stylesheet" href="css/style.css">

        <!-- jQuery CDN -->
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
        
    </head>
    <body>
        <h1>Dynamic Multiplication Table</h1>

        <div id="Form">
            <h2>Please enter the table ranges.</h2>
            <form id="formID">
                <div class="form-row">
                    <label for="mincolval">Minimum Column Value:</label>
                    <input type="text" id="mincolval" name="mincolval" 
                        required autofocus><br>
                </div>

                <div class="form-row">
                    <label for="maxcolval">Maximum Column Value:</label>
                    <input type="text" id="maxcolval" name="maxcolval" 
                        required><br>
                </div>

                <div class="form-row">
                    <label for="minrowval">Minimum Row Value:</label>
                    <input type="text" id="minrowval" name="minrowval" 
                        required><br>
                </div>
                
                <div class="form-row">
                    <label for="maxrowval">Maximum Row Value:</label>
                    <input type="text" id="maxrowval" name="maxrowval" 
                        required><br>
                </div>
                <input type="submit" id="submit-btn" value="Submit">
                <!-- <input type="reset" value="Reset"><br> -->
            </form>
        </div>

        <div id="Table-container">
            
        </div>

        <!-- scripts -->
        <!-- <script src="js/script_jquery.js"></script> -->
        <script src="jquery-validation-1.19.5/dist/jquery.validate.js"></script> 
        <script src="jquery-validation-1.19.5/dist/additional-methods.js"></script>
        <script src="js/script_jquery.js"></script>

    </body>
</html>
